services:
  - type: web
    name: chate
    env: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      # ── Set these in Render Dashboard → Environment ──
      # MONGODB_URI
      # JWT_SECRET
      # CLOUDINARY_CLOUD_NAME
      # CLOUDINARY_API_KEY
      # CLOUDINARY_API_SECRET
      # EMAIL_USER
      # EMAIL_PASS
      # GOOGLE_CLIENT_ID
      # GOOGLE_CLIENT_SECRET
      # VITE_GOOGLE_CLIENT_ID   ← needed at BUILD time for Google login button
